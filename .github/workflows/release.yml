name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish STB-DiffChecker_201
        run: >
          dotnet publish STB-DiffChecker_201/STB-DiffChecker_201.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o publish/STB-DiffChecker_201

      - name: Publish STB-DiffChecker_202
        run: >
          dotnet publish STB-DiffChecker_202/STB-DiffChecker_202.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o publish/STB-DiffChecker_202

      - name: Publish STB-DiffChecker_210
        run: >
          dotnet publish STB-DiffChecker_210/STB-DiffChecker_210.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o publish/STB-DiffChecker_210

      - name: Zip artifacts
        shell: pwsh
        run: |
          Compress-Archive -Path publish/STB-DiffChecker_201/* -DestinationPath STB-DiffChecker_201_win-x64.zip
          Compress-Archive -Path publish/STB-DiffChecker_202/* -DestinationPath STB-DiffChecker_202_win-x64.zip
          Compress-Archive -Path publish/STB-DiffChecker_210/* -DestinationPath STB-DiffChecker_210_win-x64.zip

      - name: Create GitHub Release
        # サプライチェーン対策としてコミットSHAで固定 (v2.6.2)
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            STB-DiffChecker_201_win-x64.zip
            STB-DiffChecker_202_win-x64.zip
            STB-DiffChecker_210_win-x64.zip
          generate_release_notes: true

      - name: Upload artifacts (manual run)
        uses: actions/upload-artifact@v4
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        with:
          name: STB-DiffChecker-win-x64
          path: "*.zip"
