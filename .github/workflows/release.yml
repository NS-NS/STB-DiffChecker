name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Publish STB-DiffChecker (統合版)
        run: >
          dotnet publish STB-DiffChecker.Desktop/STB-DiffChecker.Desktop.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o publish/STB-DiffChecker

      - name: Zip artifacts
        shell: pwsh
        # pdb(デバッグシンボル)は配布不要のためexeのみ同梱
        run: Compress-Archive -Path publish/STB-DiffChecker/*.exe -DestinationPath STB-DiffChecker_win-x64.zip

      - name: Create GitHub Release
        # サプライチェーン対策としてコミットSHAで固定 (v2.6.2)
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: STB-DiffChecker_win-x64.zip
          generate_release_notes: true

      - name: Upload artifacts (manual run)
        uses: actions/upload-artifact@v4
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        with:
          name: STB-DiffChecker-win-x64
          path: "*.zip"
